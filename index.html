<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>יצירת טיוטת מייל ב-Outlook</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 30px;
            font-weight: 600;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 20px 0;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        textarea {
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus,
        input[type="file"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.3);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            transform: translateY(-2px);
        }

        label {
            font-weight: 500;
            color: #374151;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            padding: 20px 35px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            font-weight: 600;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>יצירת טיוטת מייל ב-Outlook</h2>
        <form id="emailForm">
            <label>נושא:</label>
            <input type="text" id="subject" required>
            <label>כתובת נמען (ניתן להפריד בפסיקים):</label>
            <input type="text" id="to" required>
            <label>גוף ההודעה:</label>
            <textarea id="body" rows="5" required></textarea>
            <label>קובץ מצורף:</label>
            <input type="file" id="attachment">
            <button type="button" id="sendBtn">שלח ל-Outlook</button>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const sendBtn = document.getElementById('sendBtn');

        function showToast(text, color) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 5000);
        }

        sendBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            const subject = document.getElementById('subject').value;
            const to = document.getElementById('to').value.split(',');
            const body = document.getElementById('body').value;
            const fileInput = document.getElementById('attachment');
            const file = fileInput.files[0];

            const formData = new FormData();
            formData.append('subject', subject);
            formData.append('body', body);
            formData.append('to', JSON.stringify(to));
            if (file) formData.append('attachment', file);

            try {
                const res = await fetch('http://localhost:5000/create_draft', { method: 'POST', body: formData });

                let data;
                try { data = await res.json(); }
                catch { showToast("❌ שגיאת שרת: JSON לא חוקי", "linear-gradient(135deg,#dc2626,#ef4444)"); return; }

                if (data.status === "success") {
                    showToast("✔️ הטיוטה נוצרה בהצלחה!", "linear-gradient(135deg,#16a34a,#22c55e)");
                } else {
                    showToast("❌ שגיאה: " + data.message, "linear-gradient(135deg,#dc2626,#ef4444)");
                }

            } catch (err) {
                showToast("❌ שגיאת רשת או שהשרת לא פעיל", "linear-gradient(135deg,#dc2626,#ef4444)");
            }
        });
    </script>
</body>

</html>
